name: Daily AQ Ingest

on:
  schedule:
    - cron: "30 18 * * *"   # 9:00 AM CDT (UTC-5) every day
  workflow_dispatch:         # Allow manual trigger from the GitHub Actions tab

permissions:
  contents: write            # Needed so the workflow can push commits back to the repo

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily ingest
        env:
          OPENMETEO_API_KEY: ${{ secrets.OPENMETEO_API_KEY }}
        run: python run_pipeline.py --cities "Houston,TX"

      - name: Commit and push new data
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Make sure we’re on the branch (not detached) and have the latest remote state
          git fetch origin master
          git checkout master

          # Rebase our working tree on top of the latest master (prevents non-fast-forward push)
          git pull --rebase origin master

          git add state.json
          git add -f data/

          # Commit only if staged changes exist
          git diff --staged --quiet || git commit -m "chore: daily ingest $(date -u +%F)"

          # Rebase again right before pushing (handles races with other runs)
          git pull --rebase origin master

          # Push with a small retry to handle near-simultaneous updates
          for i in 1 2 3; do
            if git push origin master; then
              exit 0
            fi
            git pull --rebase origin master
            sleep 2
          done

          echo "Push failed after retries" >&2
          exit 1
